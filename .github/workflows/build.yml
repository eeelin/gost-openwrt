name: build-openwrt-ipk

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      gost_version:
        description: 'gost version to build (defaults to tag without leading v)'
        required: false
        type: string

jobs:
  build-arm64-openwrt-2203:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      OPENWRT_VERSION: '22.03.7'
      OPENWRT_TARGET: 'armsr'
      OPENWRT_SUBTARGET: 'armv8'
      PACKAGE_NAME: 'gost'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve gost version from tag/input
        id: version
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF_TYPE:-}" == "tag" ]]; then
            RAW_VERSION="${GITHUB_REF_NAME#v}"
          elif [[ -n "${{ inputs.gost_version || '' }}" ]]; then
            RAW_VERSION="${{ inputs.gost_version }}"
            RAW_VERSION="${RAW_VERSION#v}"
          else
            echo "No tag or workflow_dispatch input provided" >&2
            exit 1
          fi
          echo "raw=${RAW_VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=v${RAW_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Verify upstream gost tag exists
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "${{ steps.version.outputs.tag }}" --repo go-gost/gost >/dev/null

      - name: Patch package version
        shell: bash
        run: |
          set -euo pipefail
          sed -i "s/^PKG_VERSION:=.*/PKG_VERSION:=${{ steps.version.outputs.raw }}/" Makefile

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev \
            python3-distutils rsync swig unzip zlib1g-dev file wget curl ca-certificates

      - name: Download OpenWrt SDK
        shell: bash
        run: |
          set -euo pipefail
          SDK_NAME="openwrt-sdk-${OPENWRT_VERSION}-${OPENWRT_TARGET}-${OPENWRT_SUBTARGET}_gcc-11.2.0_musl.Linux-x86_64"
          SDK_URL="https://downloads.openwrt.org/releases/${OPENWRT_VERSION}/targets/${OPENWRT_TARGET}/${OPENWRT_SUBTARGET}/${SDK_NAME}.tar.xz"
          wget -O sdk.tar.xz "$SDK_URL"
          tar -xf sdk.tar.xz
          mv "$SDK_NAME" sdk

      - name: Prepare package feed overlay
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p sdk/package/gost-openwrt
          rsync -a --delete ./ sdk/package/gost-openwrt/ --exclude sdk --exclude .git

      - name: Update feeds
        working-directory: sdk
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Prepare build config
        working-directory: sdk
        shell: bash
        run: |
          set -euo pipefail
          cat >> .config <<CONFIG
          CONFIG_TARGET_${OPENWRT_TARGET}=y
          CONFIG_TARGET_${OPENWRT_TARGET}_${OPENWRT_SUBTARGET}=y
          CONFIG_PACKAGE_gost=y
CONFIG
          make defconfig

      - name: Build package
        working-directory: sdk
        run: |
          make package/gost-openwrt/gost/compile V=s

      - name: Collect artifacts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          find sdk/bin/packages -type f -name '*.ipk' -exec cp -v {} dist/ \;
          ls -lah dist

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: gost-openwrt-ipk-${{ steps.version.outputs.tag }}
          path: dist/*.ipk

      - name: Publish to GitHub Release
        if: github.ref_type == 'tag'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${GITHUB_REF_NAME}" dist/*.ipk --clobber
